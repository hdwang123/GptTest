<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">会话流转逻辑图</title>
  <desc id="desc">展示浏览器、后端控制器、服务端上下文和 OpenAI 接口之间的聊天会话流转。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3f4a5a"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .lane { fill: #ffffff; stroke: #d9e1ec; stroke-width: 1.2; }
      .laneTitle { fill: #162033; font: 700 16px "Microsoft YaHei", Arial, sans-serif; }
      .laneSub { fill: #64748b; font: 12px "Microsoft YaHei", Arial, sans-serif; }
      .step { fill: #eef4ff; stroke: #b7cdfd; stroke-width: 1.2; }
      .stepAlt { fill: #f1f8f4; stroke: #b9dfc7; stroke-width: 1.2; }
      .store { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.2; }
      .ai { fill: #f6f0ff; stroke: #d8c3ff; stroke-width: 1.2; }
      .text { fill: #1f2937; font: 14px "Microsoft YaHei", Arial, sans-serif; }
      .small { fill: #475569; font: 12px "Microsoft YaHei", Arial, sans-serif; }
      .arrow { stroke: #3f4a5a; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 5; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
      .noteText { fill: #475569; font: 13px "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="760" rx="18"/>

  <text x="40" y="46" class="laneTitle" style="font-size:24px">GptTest 会话流转逻辑</text>
  <text x="40" y="72" class="laneSub">前端负责展示和当前标签页历史；后端负责 SSE 推送和模型上下文；OpenAI/兼容接口负责生成回复。</text>

  <rect x="40" y="105" width="210" height="560" rx="14" class="lane"/>
  <rect x="280" y="105" width="210" height="560" rx="14" class="lane"/>
  <rect x="520" y="105" width="210" height="560" rx="14" class="lane"/>
  <rect x="760" y="105" width="210" height="560" rx="14" class="lane"/>
  <rect x="1000" y="105" width="140" height="560" rx="14" class="lane"/>

  <text x="72" y="138" class="laneTitle">浏览器页面</text>
  <text x="72" y="158" class="laneSub">chat.html</text>
  <text x="314" y="138" class="laneTitle">当前标签页历史</text>
  <text x="314" y="158" class="laneSub">sessionStorage</text>
  <text x="554" y="138" class="laneTitle">后端控制器</text>
  <text x="554" y="158" class="laneSub">ChatController</text>
  <text x="794" y="138" class="laneTitle">聊天服务</text>
  <text x="794" y="158" class="laneSub">ChatServiceNew</text>
  <text x="1020" y="138" class="laneTitle">模型接口</text>
  <text x="1020" y="158" class="laneSub">OpenAI API</text>

  <rect x="70" y="200" width="150" height="54" rx="10" class="step"/>
  <text x="92" y="224" class="text">打开 / 刷新页面</text>
  <text x="92" y="244" class="small">加载聊天 UI</text>

  <rect x="310" y="200" width="150" height="54" rx="10" class="store"/>
  <text x="332" y="224" class="text">读取历史会话</text>
  <text x="332" y="244" class="small">刷新页面仍保留</text>

  <rect x="550" y="285" width="150" height="54" rx="10" class="step"/>
  <text x="575" y="309" class="text">创建新会话</text>
  <text x="575" y="329" class="small">返回 sessionId</text>

  <rect x="70" y="370" width="150" height="54" rx="10" class="step"/>
  <text x="92" y="394" class="text">用户发送消息</text>
  <text x="92" y="414" class="small">带 sessionId</text>

  <rect x="550" y="370" width="150" height="54" rx="10" class="step"/>
  <text x="574" y="394" class="text">暂存消息</text>
  <text x="574" y="414" class="small">返回 msgId</text>

  <rect x="70" y="455" width="150" height="54" rx="10" class="stepAlt"/>
  <text x="90" y="479" class="text">建立 SSE 连接</text>
  <text x="90" y="499" class="small">GET /conversation</text>

  <rect x="790" y="455" width="150" height="54" rx="10" class="step"/>
  <text x="815" y="479" class="text">拼接上下文</text>
  <text x="815" y="499" class="small">最近 10 轮</text>

  <rect x="1020" y="455" width="100" height="54" rx="10" class="ai"/>
  <text x="1044" y="479" class="text">流式</text>
  <text x="1032" y="499" class="small">生成回复</text>

  <rect x="790" y="555" width="150" height="54" rx="10" class="store"/>
  <text x="815" y="579" class="text">保存本轮上下文</text>
  <text x="815" y="599" class="small">ChatTurn</text>

  <rect x="310" y="555" width="150" height="54" rx="10" class="store"/>
  <text x="334" y="579" class="text">保存页面历史</text>
  <text x="334" y="599" class="small">仅当前标签页</text>

  <path class="arrow" d="M220 227 L310 227"/>
  <path class="arrow" d="M385 254 C385 312 455 312 550 312"/>
  <path class="arrow" d="M550 328 C430 350 305 350 220 397"/>
  <path class="arrow" d="M220 397 L550 397"/>
  <path class="arrow" d="M625 424 C625 465 460 482 220 482"/>
  <path class="arrow" d="M220 482 L790 482"/>
  <path class="arrow" d="M940 482 L1020 482"/>
  <path class="arrow dashed" d="M1020 505 C965 540 925 540 940 506"/>
  <path class="arrow" d="M1020 505 C760 642 450 642 220 506"/>
  <path class="arrow" d="M865 509 L865 555"/>
  <path class="arrow" d="M220 506 C245 555 280 582 310 582"/>

  <rect x="50" y="688" width="1080" height="42" rx="10" class="note"/>
  <text x="70" y="714" class="noteText">关键点：sessionStorage 刷新保留、关闭标签页清空；后端 sessionHistoryMap 只存在内存里，用于让模型理解同一 sessionId 的上下文。</text>
</svg>
