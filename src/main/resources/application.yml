spring:
  mvc:
    async:
      # API timeout for SSE requests.
      request-timeout: 600000

openai:
  api-url: https://openrouter.ai/api/v1
  api-key: ${OPENROUTER_API_KEY:}
  model: openrouter/free
  max-token: 2000
  image-api-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text2image/image-synthesis
  image-task-api-url: https://dashscope.aliyuncs.com/api/v1/tasks
  image-api-key: ${DASHSCOPE_API_KEY:}
  image-model: wanx-v1
  image-size: 1024*1024
  image-poll-interval-ms: 2000
  image-poll-max-attempts: 90
  image-storage-dir: src/main/resources/static/generated-images
  image-public-url-prefix: /chat/image
  proxy:
    host: 127.0.0.1
    port: 7890
